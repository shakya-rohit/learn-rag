<div class="chat">
  <div class="messages">
    <app-chat-message *ngFor="let msg of messages" [message]="msg">
    </app-chat-message>
  </div>

  <div class="input-box">
    <input
      [(ngModel)]="userInput"
      placeholder="Type your message..."
      (keydown.enter)="sendMessage()"
    />
    <button (click)="sendMessage()">Send</button>
  </div>
</div>
